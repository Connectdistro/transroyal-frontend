<svg xmlns="http://www.w3.org/2000/svg">
  <!-- Brand mark: forward-moving double chevron. Uses currentColor so callers
       control its color via CSS (e.g. .nav__brand-mark { color: var(--electric-500) }). -->
  <symbol id="icon-mark" viewBox="0 0 32 32">
    <path d="M6 6 L18 16 L6 26" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M16 6 L28 16 L16 26" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.55" />
  </symbol>

  <!-- Track / location pin, used on the persistent "Track Shipment" nav action. -->
  <symbol id="icon-track" viewBox="0 0 24 24">
    <path d="M12 21s7-7.16 7-12a7 7 0 1 0-14 0c0 4.84 7 12 7 12z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
    <circle cx="12" cy="9" r="2.4" fill="none" stroke="currentColor" stroke-width="1.6" />
  </symbol>
</svg>
